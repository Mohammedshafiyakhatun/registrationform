<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="registration.css">
</head>
<body>
  <div class="container">
    <h1>Student Registration Form</h1>
    <form id="registrationForm">
     
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required>
      </div>

    
      <div class="form-group gender-group">
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
      </div>

      
      <div class="form-group">
        <label for="course">Course:</label>
        <select id="course" name="course" required>
          <option value="">Select a course</option>
          <option value="JAVA DEVELOPMENT">JAVA DEVELOPMENT</option>
          <option value="FULL STACK DEVELOPMENT">FULL STACK DEVELOPMENT</option>
          <option value="PYTHON DEVELOPMENT">PYTHON DEVELOPMENT</option>
          <option value="DATA SCIENCE">DATA SCIENCE</option>
        </select>
      </div>

     
      <hr>
      <label for="marks">HTML Marks:</label>
      <input type="number" id="marks" name="marks" min="0" max="100" required><br>

      <label for="marks1">CSS Marks:</label>
      <input type="number" id="marks1" name="marks1" min="0" max="100" required><br>

      <label for="marks2">JavaScript Marks:</label>
      <input type="number" id="marks2" name="marks2" min="0" max="100" required><br>

      
      <div class="button-group">
        <button type="button" id="generate" onclick="generateReport()">Generate Report</button>
        <button type="reset" id="reset">Reset</button>
      </div>
    </form>
  </div>

  <script>
    function generateReport() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const gender = document.querySelector('input[name="gender"]:checked');
      const course = document.getElementById('course').value;

      const marks = parseInt(document.getElementById('marks').value);
      const marks1 = parseInt(document.getElementById('marks1').value);
      const marks2 = parseInt(document.getElementById('marks2').value);

     
      if (!name || !email || !phone || !gender || !course) {
        alert("Please fill all required fields!");
        return;
      }
      if ([marks, marks1, marks2].some(m => isNaN(m) || m < 0 || m > 100)) {
        alert("Marks must be between 0 and 100!");
        return;
      }

    
      const total = marks + marks1 + marks2;
      const percentage = (total / 300) * 100;
      let grade, status;
      if (percentage >= 90) { grade = "A+"; status = "Pass"; }
      else if (percentage >= 75) { grade = "A"; status = "Pass"; }
      else if (percentage >= 60) { grade = "B"; status = "Pass"; }
      else if (percentage >= 40) { grade = "C"; status = "Pass"; }
      else { grade = "F"; status = "Fail"; }

      
      const reportData = { name, email, phone, gender: gender.value, course, marks, marks1, marks2, total, percentage, grade, status };
      localStorage.setItem("reportCard", JSON.stringify(reportData));

      window.location.href = "report.html";
    }
  </script>
</body>
</html>
